# ════════════════════════════════════════════════════════════════
# ClusterSecretStore — solidarytech-aws-sm
#
# Aponta para o AWS Secrets Manager usando credenciais estáticas
# do AWS Academy (sem IRSA, pois a LabRole não permite criar
# IAM roles/OIDC providers extras).
#
# As credenciais ficam num K8s Secret "aws-academy-credentials"
# no namespace "external-secrets", criado pelo workflow:
#   .github/workflows/update-aws-credentials.yml
#
# ⚠️  As credenciais do AWS Academy expiram a cada ~4h.
#     Execute o workflow "Update AWS Academy Credentials" sempre
#     que renovar os secrets no GitHub para manter o ESO funcional.
# ════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: solidarytech-aws-sm
  labels:
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/managed-by: argocd
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          # access key id
          accessKeyIDSecretRef:
            name: aws-academy-credentials
            namespace: external-secrets
            key: access-key-id
          # secret access key
          secretAccessKeySecretRef:
            name: aws-academy-credentials
            namespace: external-secrets
            key: secret-access-key
          # session token — obrigatório para credenciais temporárias
          sessionTokenSecretRef:
            name: aws-academy-credentials
            namespace: external-secrets
            key: session-token
