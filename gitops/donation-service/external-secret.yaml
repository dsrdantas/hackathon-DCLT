# ════════════════════════════════════════════════════════════════
# ExternalSecret — donation-service
#
# Lê o secret "solidarytech/prod/donation-service" do AWS Secrets Manager
# e cria o K8s Secret "donation-service-secrets" no namespace "donation".
#
# O Secret criado terá:
#   data["database-url"]  = postgresql://tc5:***@<rds-endpoint>:5432/donation_db
#   data["sqs-queue-url"] = https://sqs.us-east-1.amazonaws.com/.../solidary-donations
# ════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: donation-service-secrets
  namespace: donation
  labels:
    app: donation-service
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: solidarytech-aws-sm
    kind: ClusterSecretStore

  target:
    name: donation-service-secrets
    creationPolicy: Owner
    deletionPolicy: Retain

  dataFrom:
    - extract:
        key: solidarytech/prod/donation-service
