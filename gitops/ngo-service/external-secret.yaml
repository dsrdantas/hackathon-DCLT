# ════════════════════════════════════════════════════════════════
# ExternalSecret — ngo-service
#
# Lê o secret "solidarytech/prod/ngo-service" do AWS Secrets Manager
# e cria o Kubernetes Secret "ngo-service-secrets" no namespace "ngo".
#
# O Secret criado terá:
#   data["database-url"] = postgresql://tc5:***@<rds-endpoint>:5432/ngo_db
#
# O Deployment referencia este secret via:
#   secretKeyRef: name: ngo-service-secrets, key: database-url
# ════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ngo-service-secrets
  namespace: ngo
  labels:
    app: ngo-service
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/managed-by: argocd
spec:
  # Intervalo de sincronização: o ESO verifica o SM a cada 1h
  refreshInterval: 1h

  secretStoreRef:
    name: solidarytech-aws-sm
    kind: ClusterSecretStore

  target:
    name: ngo-service-secrets   # nome do K8s Secret que será criado
    creationPolicy: Owner        # ESO gerencia o ciclo de vida do Secret
    deletionPolicy: Retain       # mantém o K8s Secret se o ExternalSecret for deletado

  # dataFrom.extract: extrai TODAS as chaves do JSON do SM secret
  # como campos individuais do K8s Secret
  dataFrom:
    - extract:
        key: solidarytech/prod/ngo-service
