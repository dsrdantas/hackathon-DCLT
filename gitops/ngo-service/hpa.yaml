apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ngo-service
  namespace: ngo
  labels:
    app: ngo-service
    app.kubernetes.io/part-of: solidarytech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ngo-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
