# ServiceAccount para o volunteer-service
# Em produção real: usar IRSA (IAM Roles for Service Accounts) para
# conceder acesso ao DynamoDB sem credenciais estáticas.
# Substituir a annotation abaixo pelo ARN da role IRSA após terraform apply.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: volunteer-service-sa
  namespace: volunteer
  labels:
    app: volunteer-service
    app.kubernetes.io/part-of: solidarytech
  annotations:
    # eks.amazonaws.com/role-arn: arn:aws:iam::AWS_ACCOUNT_ID:role/volunteer-service-irsa
    # Descomente e substitua o ARN acima quando IRSA estiver configurado.
    # Enquanto isso, use a secret volunteer-service-secrets com as credenciais.
    managed-by: argocd
