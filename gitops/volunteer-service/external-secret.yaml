# ════════════════════════════════════════════════════════════════
# ExternalSecret — volunteer-service
#
# Lê o secret "solidarytech/prod/volunteer-service" do AWS Secrets Manager
# e cria o K8s Secret "volunteer-service-secrets" no namespace "volunteer".
#
# O Secret criado terá:
#   data["dynamodb-table"] = SolidaryTechVolunteers
#   data["aws-region"]     = us-east-1
# ════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: volunteer-service-secrets
  namespace: volunteer
  labels:
    app: volunteer-service
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: solidarytech-aws-sm
    kind: ClusterSecretStore

  target:
    name: volunteer-service-secrets
    creationPolicy: Owner
    deletionPolicy: Retain

  dataFrom:
    - extract:
        key: solidarytech/prod/volunteer-service
