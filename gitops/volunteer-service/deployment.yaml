apiVersion: apps/v1
kind: Deployment
metadata:
  name: volunteer-service
  namespace: volunteer
  labels:
    app: volunteer-service
    app.kubernetes.io/name: volunteer-service
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/version: latest
  annotations:
    # Stakater Reloader: reinicia o Deployment quando o ESO
    # atualizar "volunteer-service-secrets" (dynamodb-table ou aws-region).
    secret.reloader.stakater.com/reload: "volunteer-service-secrets"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: volunteer-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: volunteer-service
        app.kubernetes.io/name: volunteer-service
        app.kubernetes.io/part-of: solidarytech
        app.kubernetes.io/version: latest
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/health"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      serviceAccountName: volunteer-service-sa
      containers:
        - name: volunteer-service
          # ↓ GitHub Actions atualiza esta linha a cada build
          image: AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/solidarytech-prod-volunteer-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          env:
            - name: FLASK_ENV
              value: "production"
            - name: PORT
              value: "8083"
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: volunteer-service-secrets   # criado pelo ExternalSecret
                  key: aws-region
            - name: DYNAMODB_TABLE
              valueFrom:
                secretKeyRef:
                  name: volunteer-service-secrets
                  key: dynamodb-table
            # ── OpenTelemetry ────────────────────────────────
            - name: OTEL_SERVICE_NAME
              value: "volunteer-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_always_on"
            - name: OTEL_PYTHON_LOG_CORRELATION
              value: "true"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,project=solidarytech"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
