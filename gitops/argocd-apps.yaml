---
# ── Application: observability ────────────────────────────────
# Gerencia ServiceMonitors e o Grafana dashboard ConfigMap.
# Wave -1: os monitores devem existir antes dos microserviços para
# que o Prometheus comece a coletar métricas desde o primeiro deploy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
  labels:
    project: solidarytech
    tier: platform
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: solidarytech

  source:
    repoURL: https://github.com/dsrdantas/hackathon-DCLT
    targetRevision: main
    path: gitops/observability

  destination:
    server: https://kubernetes.default.svc
    namespace: observability   # namespace padrão (ServiceMonitors do OTel Collector)

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false   # namespace criado pelo Terraform (Helm do OTel Collector)
      - PrunePropagationPolicy=foreground
      # ServerSideApply evita conflitos de field ownership nos CRDs do Prometheus Operator
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 3

  info:
    - name: "Componentes"
      value: "ServiceMonitors + Grafana Dashboard"
