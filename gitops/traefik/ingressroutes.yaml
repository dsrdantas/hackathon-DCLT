# ════════════════════════════════════════════════════════════════
# gitops/traefik/ingressroutes.yaml
#
# IngressRoutes centralizadas — todas as rotas da plataforma
# SolidaryTech gerenciadas em um único manifesto.
#
# Namespace: traefik (mesmo do Ingress Controller)
# Provider:  kubernetesCRD (Traefik lê CRDs nativo)
#
# Acesso via LoadBalancer (NLB AWS):
#   Microserviços (strip prefix — o app recebe "/" como raiz):
#     http://<lb>/ngo/         → ngo-service       (namespace: ngo)
#     http://<lb>/donation/    → donation-service  (namespace: donation)
#     http://<lb>/volunteer/   → volunteer-service (namespace: volunteer)
#
#   Plataforma (sem strip — o app trata o prefix internamente):
#     http://<lb>/argocd       → ArgoCD UI         (namespace: argocd)
#     http://<lb>/prometheus   → Prometheus UI     (namespace: monitoring)
#     http://<lb>/grafana      → Grafana UI        (namespace: monitoring)
#
# Pré-requisito: allowCrossNamespace: true no Helm do Traefik
#   (configurado em terraform/modules/gitops/main.tf)
#
# Para obter o hostname do LoadBalancer:
#   kubectl get svc traefik -n traefik \
#     -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
# ════════════════════════════════════════════════════════════════

# ── HTTP — microserviços (com StripPrefix) ────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: solidarytech-http
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/managed-by: argocd
    routing: "http"
spec:
  entryPoints:
    - web        # porta 80

  routes:

    # ── /ngo → ngo-service ──────────────────────────────────────
    - match: PathPrefix(`/ngo`)
      kind: Rule
      priority: 10
      services:
        - name: ngo-service
          namespace: ngo     # referência cross-namespace
          port: 80
          passHostHeader: true
      middlewares:
        - name: strip-ngo       # remove o prefixo /ngo antes de encaminhar
          namespace: traefik
        - name: secure-headers
          namespace: traefik

    # ── /donation → donation-service ────────────────────────────
    - match: PathPrefix(`/donation`)
      kind: Rule
      priority: 10
      services:
        - name: donation-service
          namespace: donation
          port: 80
          passHostHeader: true
      middlewares:
        - name: strip-donation
          namespace: traefik
        - name: secure-headers
          namespace: traefik

    # ── /volunteer → volunteer-service ──────────────────────────
    - match: PathPrefix(`/volunteer`)
      kind: Rule
      priority: 10
      services:
        - name: volunteer-service
          namespace: volunteer
          port: 80
          passHostHeader: true
      middlewares:
        - name: strip-volunteer
          namespace: traefik
        - name: secure-headers
          namespace: traefik

---
# ── HTTP — plataforma (sem StripPrefix) ───────────────────────
# ArgoCD, Prometheus e Grafana tratam o prefixo de path
# internamente via rootpath / routePrefix / serve_from_sub_path.
# O Traefik encaminha o request com o path original intacto.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: solidarytech-platform
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/managed-by: argocd
    routing: "platform"
spec:
  entryPoints:
    - web

  routes:

    # ── /argocd → ArgoCD UI ─────────────────────────────────────
    # ArgoCD configurado com --rootpath=/argocd (server.rootpath)
    # NÃO remove o prefixo: o ArgoCD espera receber /argocd/...
    - match: PathPrefix(`/argocd`)
      kind: Rule
      priority: 20
      services:
        - name: argocd-server
          namespace: argocd
          port: 80
          passHostHeader: true
      middlewares:
        - name: secure-headers
          namespace: traefik

    # ── /prometheus → Prometheus UI ─────────────────────────────
    # Prometheus configurado com routePrefix: /prometheus
    # NÃO remove o prefixo: o Prometheus serve em /prometheus/...
    - match: PathPrefix(`/prometheus`)
      kind: Rule
      priority: 20
      services:
        - name: kube-prometheus-stack-prometheus
          namespace: monitoring
          port: 9090
          passHostHeader: true
      middlewares:
        - name: secure-headers
          namespace: traefik

    # ── /grafana → Grafana UI ───────────────────────────────────
    # Grafana configurado com serve_from_sub_path e root_url /grafana/
    # NÃO remove o prefixo: o Grafana serve em /grafana/...
    - match: PathPrefix(`/grafana`)
      kind: Rule
      priority: 20
      services:
        - name: kube-prometheus-stack-grafana
          namespace: monitoring
          port: 80
          passHostHeader: true
      middlewares:
        - name: secure-headers
          namespace: traefik

---
# ── Health-check do LoadBalancer ──────────────────────────────
# Rota dedicada para o NLB verificar a saúde do Traefik.
# Retorna 200 diretamente do Traefik (ping built-in).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-ping
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - web
  routes:
    - match: Path(`/ping`)
      kind: Rule
      priority: 100           # maior prioridade — responde antes de qualquer regra
      services:
        - name: ping@internal  # endpoint de ping do Traefik (requer ping.entryPoint no Helm)
          kind: TraefikService
