# ════════════════════════════════════════════════════════════════
# .github/workflows/update-aws-credentials.yml
#
# Injeta as credenciais AWS Academy no cluster EKS como um
# Kubernetes Secret, para que o External Secrets Operator (ESO)
# possa autenticar no AWS Secrets Manager.
#
# QUANDO EXECUTAR:
#   Sempre que renovar as credenciais no AWS Academy Learner Lab
#   e atualizar os secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   e AWS_SESSION_TOKEN no GitHub (Settings → Secrets → Actions).
#
# COMO EXECUTAR:
#   GitHub → Actions → "Update AWS Academy Credentials" → Run workflow
#
# O que faz:
#   1. Autentica na AWS com as credenciais temporárias do Academy
#   2. Atualiza o kubeconfig para o cluster EKS
#   3. Cria/atualiza o K8s Secret "aws-academy-credentials"
#      no namespace "external-secrets"
#   4. Força o ESO a re-sincronizar os ExternalSecrets
#
# Secrets necessários (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID      — credencial temporária (~4h)
#   AWS_SECRET_ACCESS_KEY  — credencial temporária (~4h)
#   AWS_SESSION_TOKEN      — token de sessão (~4h)
#   AWS_ACCOUNT_ID         — ID da conta (permanente)
# ════════════════════════════════════════════════════════════════

name: Update AWS Academy Credentials

on:
  workflow_dispatch:   # Acionado manualmente pelo usuário

env:
  AWS_REGION:    us-east-1
  EKS_CLUSTER:   solidarytech-prod-eks
  ESO_NAMESPACE: external-secrets
  SECRET_NAME:   aws-academy-credentials
  OBS_NAMESPACE: observability

jobs:
  update-credentials:
    name: "Inject AWS credentials → EKS"
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (AWS Academy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Validar credenciais
        run: |
          echo "🔍 Validando credenciais AWS..."
          aws sts get-caller-identity
          echo "✅ Credenciais válidas"

      - name: Atualizar kubeconfig
        run: |
          echo "⚙️  Configurando acesso ao cluster ${{ env.EKS_CLUSTER }}..."
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}
          kubectl cluster-info
          echo "✅ kubeconfig atualizado"

      - name: Garantir namespace external-secrets existe
        run: |
          kubectl get namespace ${{ env.ESO_NAMESPACE }} 2>/dev/null \
            || kubectl create namespace ${{ env.ESO_NAMESPACE }}

      - name: Criar/Atualizar K8s Secret com credenciais AWS
        run: |
          echo "🔐 Atualizando secret '${{ env.SECRET_NAME }}' no namespace '${{ env.ESO_NAMESPACE }}'..."

          kubectl create secret generic ${{ env.SECRET_NAME }} \
            --namespace ${{ env.ESO_NAMESPACE }} \
            --from-literal=access-key-id="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --from-literal=secret-access-key="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --from-literal=session-token="${{ secrets.AWS_SESSION_TOKEN }}" \
            --dry-run=client -o yaml \
          | kubectl apply -f -

          echo "✅ Secret atualizado"

      - name: Verificar ClusterSecretStore
        run: |
          echo "🔎 Verificando status do ClusterSecretStore..."
          if kubectl get clustersecretstore solidarytech-aws-sm &>/dev/null; then
            # Força re-leitura das credenciais pelo ESO
            kubectl annotate clustersecretstore solidarytech-aws-sm \
              credentials-updated-at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --overwrite

            sleep 5
            kubectl get clustersecretstore solidarytech-aws-sm \
              -o jsonpath='{.status.conditions[*]}' | python3 -m json.tool || true
          else
            echo "⚠️  ClusterSecretStore ainda não existe (ArgoCD ainda não fez o sync)."
            echo "    Execute o sync do ArgoCD após o primeiro terraform apply."
          fi

      - name: Criar/Atualizar K8s Secret do New Relic (OTel Collector)
        run: |
          echo "🔑 Atualizando secret 'new-relic-credentials' no namespace '${{ env.OBS_NAMESPACE }}'..."

          # Garante que o namespace existe (criado pelo Terraform, mas pode não existir ainda)
          kubectl get namespace ${{ env.OBS_NAMESPACE }} 2>/dev/null \
            || kubectl create namespace ${{ env.OBS_NAMESPACE }}

          if [ -n "${{ secrets.NEW_RELIC_LICENSE_KEY }}" ]; then
            kubectl create secret generic new-relic-credentials \
              --namespace ${{ env.OBS_NAMESPACE }} \
              --from-literal=license-key="${{ secrets.NEW_RELIC_LICENSE_KEY }}" \
              --dry-run=client -o yaml \
            | kubectl apply -f -
            echo "✅ Secret New Relic atualizado"
          else
            echo "⚠️  NEW_RELIC_LICENSE_KEY não configurado — OTel Collector funcionará"
            echo "    apenas com o exporter Prometheus (sem envio para New Relic)."
            echo "    Adicione o secret em: Settings → Secrets → Actions → NEW_RELIC_LICENSE_KEY"
          fi

      - name: Forçar re-sync dos ExternalSecrets
        run: |
          echo "🔄 Forçando re-sync de todos os ExternalSecrets..."

          for NS in ngo donation volunteer; do
            ES=$(kubectl get externalsecret -n $NS -o name 2>/dev/null)
            if [ -n "$ES" ]; then
              kubectl annotate $ES \
                -n $NS \
                force-sync="$(date +%s)" \
                --overwrite
              echo "  ✅ $NS: $ES re-sincronizado"
            else
              echo "  ℹ️  $NS: sem ExternalSecrets ainda"
            fi
          done

      - name: Resumo
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "  Atualização concluída com sucesso!"
          echo "════════════════════════════════════════════"
          echo ""
          echo "  Secrets AWS:"
          echo "    ${{ env.SECRET_NAME }} → ${{ env.ESO_NAMESPACE }}"
          echo ""
          echo "  Observabilidade:"
          echo "    new-relic-credentials   → ${{ env.OBS_NAMESPACE }}"
          echo ""
          echo "  Cluster:   ${{ env.EKS_CLUSTER }}"
          echo ""
          echo "  ⚠️  Lembre-se: credenciais AWS expiram em ~4h."
          echo "  Execute este workflow novamente após renovar"
          echo "  os secrets no AWS Academy Learner Lab."
          echo ""
          echo "  GitHub Secrets necessários:"
          echo "    AWS_ACCESS_KEY_ID     — credencial temporária"
          echo "    AWS_SECRET_ACCESS_KEY — credencial temporária"
          echo "    AWS_SESSION_TOKEN     — token de sessão (~4h)"
          echo "    AWS_ACCOUNT_ID        — ID da conta (permanente)"
          echo "    NEW_RELIC_LICENSE_KEY — chave de ingestão (permanente)"
          echo "════════════════════════════════════════════"
