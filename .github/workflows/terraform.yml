# ════════════════════════════════════════════════════════════════
# .github/workflows/terraform.yml
#
# CI/CD para a infraestrutura Terraform
#
# Jobs:
#   1. validate — terraform fmt + validate + tflint
#   2. plan     — terraform plan (em PRs, exibe o diff no PR)
#   3. apply    — terraform apply (apenas em push para main, manual)
#
# Secrets necessários:
#   AWS_ACCESS_KEY_ID      — credencial temporária do AWS Academy
#   AWS_SECRET_ACCESS_KEY  — credencial temporária do AWS Academy
#   AWS_SESSION_TOKEN      — token de sessão do AWS Academy (obrigatório!)
#   RDS_PASSWORD           — senha do PostgreSQL (passada ao terraform plan)
#
# ⚠️  AWS Academy emite credenciais temporárias (~4h). Atualize os três
#     secrets acima a cada sessão em: Settings → Secrets → Actions
# ════════════════════════════════════════════════════════════════

name: Terraform CI/CD

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Ação Terraform"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.9.0"
  TF_WORKING_DIR: terraform

jobs:
  # ── Job 1: Validação ──────────────────────────────────────────
  validate:
    name: "Terraform Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (AWS Academy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform fmt check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: tflint — linting de boas práticas
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: tflint run
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tflint --init
          tflint --recursive || echo "⚠️ tflint encontrou avisos"

      - name: Trivy — scan IaC (Terraform)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ${{ env.TF_WORKING_DIR }}/
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

  # ── Job 2: Terraform Plan ─────────────────────────────────────
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (AWS Academy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="rds_password=${{ secrets.RDS_PASSWORD }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt

      - name: Comentar plan no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan-output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (output truncado)'
              : plan;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🏗️ Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  # ── Job 3: Terraform Apply (manual / main only) ───────────────
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: plan
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment:
      name: production
      url: "https://github.com/${{ github.repository }}/actions"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (AWS Academy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
