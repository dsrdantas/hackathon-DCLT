# ════════════════════════════════════════════════════════════════
# .github/workflows/terraform.yml
#
# CI/CD para a infraestrutura Terraform
#
# Jobs:
#   1. validate — terraform fmt + validate + tflint
#   2. plan     — terraform plan (em PRs, exibe o diff no PR)
#   3. apply    — terraform apply (apenas em push para main, manual)
#
# Secrets necessários:
#   AWS_ACCESS_KEY_ID      — credencial temporária do AWS Academy
#   AWS_SECRET_ACCESS_KEY  — credencial temporária do AWS Academy
#   AWS_SESSION_TOKEN      — token de sessão do AWS Academy (obrigatório!)
#   RDS_PASSWORD           — senha do PostgreSQL (passada ao terraform plan)
#
# ⚠️  AWS Academy emite credenciais temporárias (~4h). Atualize os três
#     secrets acima a cada sessão em: Settings → Secrets → Actions
# ════════════════════════════════════════════════════════════════

name: Terraform CI/CD

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Ação Terraform"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.9.0"
  TF_WORKING_DIR: terraform

jobs:
  # ── Job 1: Validação ──────────────────────────────────────────
  validate:
    name: "Terraform Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (AWS Academy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform fmt check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: tflint — linting de boas práticas
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: tflint run
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tflint --init
          tflint --recursive || echo "⚠️ tflint encontrou avisos"

      - name: Trivy — scan IaC (Terraform)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ${{ env.TF_WORKING_DIR }}/
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

  # ── Job 2: Terraform Plan ─────────────────────────────────────
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (AWS Academy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap backend (S3 + DynamoDB)
        run: |
          # Cria o bucket de estado se ainda nao existir
          if ! aws s3api head-bucket --bucket solidarytech-prod-tfstate 2>/dev/null; then
            aws s3api create-bucket \
              --bucket solidarytech-prod-tfstate \
              --region us-east-1
            aws s3api put-bucket-versioning \
              --bucket solidarytech-prod-tfstate \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket solidarytech-prod-tfstate \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "Bucket solidarytech-prod-tfstate criado."
          else
            echo "Bucket solidarytech-prod-tfstate ja existe."
          fi

          # Cria a tabela DynamoDB de lock se ainda nao existir
          if ! aws dynamodb describe-table --table-name solidarytech-prod-terraform-lock \
               --region us-east-1 2>/dev/null; then
            aws dynamodb create-table \
              --table-name solidarytech-prod-terraform-lock \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region us-east-1
            echo "Tabela DynamoDB solidarytech-prod-terraform-lock criada."
          else
            echo "Tabela DynamoDB solidarytech-prod-terraform-lock ja existe."
          fi

      - name: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Detect EKS bootstrap mode
        id: eks
        run: |
          # Se o cluster nao existe ainda, os providers Helm/K8s nao conseguem
          # inicializar (data.aws_eks_cluster falha). Nesse caso fazemos plan
          # somente do modulo EKS (primeiro deploy).
          if aws eks describe-cluster \
               --name solidarytech-prod-eks \
               --region ${{ env.AWS_REGION }} \
               --query "cluster.status" --output text 2>/dev/null | grep -qE "ACTIVE|UPDATING"; then
            echo "bootstrap=false" >> $GITHUB_OUTPUT
            echo "EKS cluster encontrado — plan completo"
          else
            echo "bootstrap=true" >> $GITHUB_OUTPUT
            echo "EKS cluster nao encontrado — plan somente module.eks (primeiro deploy)"
          fi

      - name: terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -o pipefail
          if [ "${{ steps.eks.outputs.bootstrap }}" = "true" ]; then
            # Primeiro deploy: planeja apenas o EKS para nao depender dos providers K8s/Helm
            terraform plan \
              -target=module.eks \
              -var="rds_password=${{ secrets.RDS_PASSWORD }}" \
              -out=tfplan \
              -no-color 2>&1 | tee plan-output.txt
          else
            terraform plan \
              -var="rds_password=${{ secrets.RDS_PASSWORD }}" \
              -out=tfplan \
              -no-color 2>&1 | tee plan-output.txt
          fi

      - name: Comentar plan no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan-output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (output truncado)'
              : plan;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🏗️ Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1
          if-no-files-found: error

  # ── Job 3: Terraform Apply (manual / main only) ───────────────
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: plan
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment:
      name: production
      url: "https://github.com/${{ github.repository }}/actions"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (AWS Academy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap backend (S3 + DynamoDB)
        run: |
          if ! aws s3api head-bucket --bucket solidarytech-prod-tfstate 2>/dev/null; then
            aws s3api create-bucket \
              --bucket solidarytech-prod-tfstate \
              --region us-east-1
            aws s3api put-bucket-versioning \
              --bucket solidarytech-prod-tfstate \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket solidarytech-prod-tfstate \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "Bucket solidarytech-prod-tfstate criado."
          else
            echo "Bucket solidarytech-prod-tfstate ja existe."
          fi
          if ! aws dynamodb describe-table --table-name solidarytech-prod-terraform-lock \
               --region us-east-1 2>/dev/null; then
            aws dynamodb create-table \
              --table-name solidarytech-prod-terraform-lock \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region us-east-1
            echo "Tabela DynamoDB solidarytech-prod-terraform-lock criada."
          else
            echo "Tabela DynamoDB solidarytech-prod-terraform-lock ja existe."
          fi

      - name: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Detect EKS bootstrap mode
        id: eks
        run: |
          if aws eks describe-cluster \
               --name solidarytech-prod-eks \
               --region ${{ env.AWS_REGION }} \
               --query "cluster.status" --output text 2>/dev/null | grep -qE "ACTIVE|UPDATING"; then
            echo "bootstrap=false" >> $GITHUB_OUTPUT
          else
            echo "bootstrap=true" >> $GITHUB_OUTPUT
          fi

      # Download AFTER init: the plan binary must match the provider versions
      # installed by init in this job's runner
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if [ "${{ steps.eks.outputs.bootstrap }}" = "true" ]; then
            # Primeiro deploy: o tfplan cobre apenas module.eks (gerado pelo plan job)
            # Fase 1: aplica EKS para que os providers K8s/Helm possam se conectar
            terraform apply -auto-approve tfplan
            # Fase 2: aplica tudo o mais (ArgoCD, RDS, ElastiCache, etc.)
            echo "EKS criado. Aplicando infra completa..."
            terraform apply -auto-approve \
              -var="rds_password=${{ secrets.RDS_PASSWORD }}"
          else
            # Deploy normal: cluster ja existe, aplica o plan completo
            terraform apply -auto-approve tfplan
          fi
