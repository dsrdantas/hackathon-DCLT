# ════════════════════════════════════════════════════════════════
# .github/workflows/volunteer-service.yml
#
# CI/CD pipeline para o volunteer-service (Python / Flask)
#
# Jobs:
#   1. test          — pytest + linting
#   2. security-scan — Bandit (SAST) + Trivy
#   3. build-push    — build amd64 + push para ECR
#   4. update-manifest — atualiza a tag no gitops/volunteer-service/deployment.yaml
#
# Secrets necessários:
#   AWS_ACCESS_KEY_ID      — credencial temporária do AWS Academy
#   AWS_SECRET_ACCESS_KEY  — credencial temporária do AWS Academy
#   AWS_SESSION_TOKEN      — token de sessão do AWS Academy (obrigatório!)
#   AWS_ACCOUNT_ID         — ID da conta AWS (12 dígitos)
#   GIT_TOKEN              — PAT com escopo repo para push nos manifestos
#
# ⚠️  AWS Academy emite credenciais temporárias (~4h). Atualize os três
#     secrets acima a cada sessão em: Settings → Secrets → Actions
# ════════════════════════════════════════════════════════════════

name: volunteer-service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "volunteer-service/**"
      - ".github/workflows/volunteer-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "volunteer-service/**"
      - ".github/workflows/volunteer-service.yml"

env:
  AWS_REGION:      us-east-1
  ECR_REPO:        solidarytech-prod-volunteer-service
  SERVICE_DIR:     volunteer-service
  GITOPS_MANIFEST: gitops/volunteer-service/deployment.yaml
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Job 1: Testes unitários ───────────────────────────────────
  test:
    name: "Test (Python)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: volunteer-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: volunteer-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          # py_compile verifica sintaxe + imports estáticos sem executar código de startup
          # (evita falha por DYNAMODB_TABLE ausente no runner de CI)
          if [ -d tests ]; then
            pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
          else
            echo "Sem diretório tests/; validando sintaxe e dependências..."
            python -m py_compile app.py && echo "✅ Sintaxe app.py OK"
            pip check && echo "✅ Dependências compatíveis"
          fi

  # ── Job 2: Security Scan ──────────────────────────────────────
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bandit SAST — análise estática de segurança
        run: |
          pip install bandit
          bandit -r ${{ env.SERVICE_DIR }}/ \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r ${{ env.SERVICE_DIR }}/ \
            --severity-level high \
            --confidence-level high
          echo "✅ Bandit concluído"

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report-volunteer
          path: bandit-report.json
          retention-days: 7

      - name: Trivy — scan no Dockerfile e dependências
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:      fs
          scan-ref:       ${{ env.SERVICE_DIR }}/
          format:         table
          # exit-code "0": fs scan é informativo; o gate real é o scan da imagem publicada
          exit-code:      "0"
          severity:       CRITICAL,HIGH
          ignore-unfixed: true

  # ── Job 3: Build e Push para ECR ─────────────────────────────
  build-push:
    name: "Build & Push ECR"
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (AWS Academy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag e URI da imagem
        id: meta
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TAG="${{ github.run_number }}-${SHORT_SHA}"
          URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "uri=${URI}" >> $GITHUB_OUTPUT
          echo "📦 Imagem: ${URI}:${TAG}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push imagem Docker (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.SERVICE_DIR }}
          file: ${{ env.SERVICE_DIR }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.uri }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — scan na imagem publicada (gate de segurança)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      "${{ steps.meta.outputs.uri }}:${{ steps.meta.outputs.tag }}"
          format:         sarif
          output:         trivy-image.sarif
          # exit-code "1": imagem publicada DEVE passar sem CRITICAL/HIGH
          exit-code:      "1"
          severity:       CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif
          category: trivy-volunteer-service

  # ── Job 4: Atualizar manifesto GitOps ────────────────────────
  update-manifest:
    name: "Update GitOps Manifest"
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Atualizar tag no deployment.yaml
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          NEW_IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${IMAGE_TAG}"
          echo "🔄 Atualizando imagem para: ${NEW_IMAGE}"

          sed -i "s|.*solidarytech-prod-volunteer-service:.*|          image: ${NEW_IMAGE}|g" \
            ${{ env.GITOPS_MANIFEST }}

          sed -i "s|app.kubernetes.io/version: .*|app.kubernetes.io/version: \"${IMAGE_TAG}\"|g" \
            ${{ env.GITOPS_MANIFEST }}

      - name: Commit e Push manifesto atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.GITOPS_MANIFEST }}

          if git diff --staged --quiet; then
            echo "Nenhuma alteração no manifesto; pulando commit."
          else
            git commit -m "ci(volunteer-service): update image tag to ${{ needs.build-push.outputs.image_tag }} [skip ci]"
            git push
          fi
